<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recarga - Veloz Pass</title>
    <link rel="icon" type="image/png" href="Assets/Favicon.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="css/style5.css">
</head>

<body>
    <div class="background-container">
        <header class="cabeçalho">
            <a href="/dashboard" class="logo-link">
                <div class="logotipo">
                    <img src="Assets/NewLogoWeb.png" alt="VelozPassLogo">
                </div>
            </a>
            <div class="header-actions">
                <div class="user-actions">
                    <a href="/carteira_digital" class="header-link">
                        <i class="bi bi-credit-card"></i>
                        <span>Carteira Digital</span>
                    </a>

                    <button id="change-button" class="icon-button">
                        <i class="bi bi-brightness-high-fill"></i>
                    </button>

                    <a class="icon-button exit-link">
                        <i class="bi bi-box-arrow-left"></i>
                    </a>
                </div>
            </div>
        </header>

        <main class="main-content">
            <h1 class="titulo-pagina-externo">RECARGA</h1>

            <div class="container-recarga">
                <div class="top-recarga">
                    <div class="top-group">
                        <h4>Formas de pagamento</h4>
                        <div class="select-wrapper">
                            <select id="select-pagamento">
                                <option disabled selected>Selecione</option>
                                <option>Carteira Digital</option>
                                <!-- Opção de valor da carteira digital com duas possibilidades:
                                1. Se o usuário selecionar ela primeiro e depois valor, caso o valor seja insuficiente, mostre um alert dizendo "Valor Insuficiente, mostrando o valor disponivel no alert"
                                2. Se o usuário selecionar um valor primeiro se for insuficiente, está opção ficará desabilitada até colocar o valor suficiente. -->
                                <option>Cartão de Crédito</option>
                                <option>Cartão de Débito</option>
                                <option>PIX</option>
                                <option>Cartão Internacional</option>
                            </select>
                            <i class="bi bi-chevron-down select-icon"></i>
                        </div>
                    </div>

                    <div class="top-group valor">
                        <h4>Valor</h4>
                        <input type="text" placeholder="R$ 0,00">
                    </div>
                </div>

                <div class="card-recarga">
                    <section class="passo passo-1">
                        <h3>Passo 1</h3>

                        <div class="buscard-image">
                            <img src="Assets/Cartão-ideal.png" alt="JoinvilleCard">
                        </div>

                        <div class="confirm-card">
                            <h4>Informe o Nº do seu Cartão de Transporte</h4>
                            <input type="text" placeholder="00.00.00000000-0" maxlength="13">

                            <h4>Confirme o Nº do seu Cartão de Transporte</h4>
                            <input type="text" placeholder="00.00.00000000-0" maxlength="13">
                        </div>
                    </section>

                    <div class="divider"></div>

                    <section class="passo passo-2">
                        <h3>Passo 2</h3>

                        <div class="payment-information">
                            <!-- Um container onde o usuário irá colocar informações do cartão de passagem, colocar um valor predefinido ou definido para a recarga, porém
                    as informações do "form" serão diferentes conforme o método selecionado. -->
                        </div>
                    </section>
                </div>

                <div class="action-area">
                    <button class="btn-prosseguir">PROSSEGUIR</button>
                </div>
            </div>

            <!-- Modal -->

            <div id="logoutModal" class="modal-overlay">
                <div class="modal-box">
                    <h3>Deseja sair da sua conta?</h3>
                    <div class="modal-buttons">
                        <button id="btn-sim-logout" class="btn-sim">Sim</button>
                        <button id="btn-nao-logout" class="btn-nao">Não</button>
                    </div>
                </div>
            </div>
        </main>

    </div>
    <script src="src/dist/bundle-recarga.js"></script>
</body>

</html>
