<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Histórico - Veloz Pass</title>
    <link rel="icon" type="image/png" href="Assets/Favicon.png">
    <link rel="stylesheet" href="css/style3.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
</head>

<body>
    <div class="background-container">
        <header class="cabeçalho">
            <a href="/dashboard" class="logo-link">
                <div class="logotipo">
                    <img src="Assets/NewLogoWeb.png" alt="VelozPassLogo">
                </div>
            </a>
            <div class="header-actions">
                <div class="user-actions">
                    <a href="/carteira_digital" class="header-link">
                        <i class="bi bi-credit-card"></i>
                        <span>Carteira Digital</span>
                    </a>

                    <button id="change-button" class="icon-button">
                        <i class="bi bi-brightness-high-fill"></i>
                    </button>

                    <a class="icon-button exit-link">
                        <i class="bi bi-box-arrow-left"></i>
                    </a>
                </div>
            </div>
        </header>

        <main class="main-content">
            <h1 class="historicoSite">Histórico Geral</h1>
            <div class="card-container">
                <div class="tabela-wrapper-scroll">
                    <div class="tabela-header">
                        <span>PROTOCOLO</span>
                        <span>TIPO</span> <!-- Tipo: Recarga ou Carteira Digital -->
                        <span>REALIZADO NO</span> <!-- Realizado por: Se foi por Cartão Débito, Pix, etc. -->
                        <span>VALOR</span>
                        <span>IMPRIMIR PROTOCOLO</span>
                    </div>
                    <div class="tabela-corpoInfo">
                    </div>
                </div>
            </div>

            <!-- Modal -->

            <div id="logoutModal" class="modal-overlay">
                <div class="modal-box">
                    <h3>Deseja sair da sua conta?</h3>
                    <div class="modal-buttons">
                        <button id="btn-sim-logout" class="btn-sim">Sim</button>
                        <button id="btn-nao-logout" class="btn-nao">Não</button>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="src/script3.js"></script>
</body>

</html>
